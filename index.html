<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学习工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a2332 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 480px;
  width: 100%;
}
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  color: #fff;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 1px;
}
.header p {
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  margin-top: 8px;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 28px 16px;
  text-decoration: none;
  text-align: center;
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.card:active {
  transform: scale(0.96);
  background: rgba(255,255,255,0.12);
}
.card.disabled {
  opacity: 0.4;
  cursor: default;
}
.card.disabled:active {
  transform: none;
}
.card-icon {
  font-size: 40px;
  margin-bottom: 12px;
}
.card-title {
  color: #fff;
  font-size: 15px;
  font-weight: 600;
}
.card-badge {
  display: inline-block;
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  margin-top: 6px;
  padding: 2px 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
}
.card-badge.active {
  color: #2ecc71;
  background: rgba(46,204,113,0.15);
}
.footer {
  text-align: center;
  margin-top: 40px;
  color: rgba(255,255,255,0.2);
  font-size: 12px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>学习工具箱</h1>
    <p>选择你要学习的科目</p>
  </div>
  <div class="grid">
    <a href="sixsigma.html" class="card" style="border-color: rgba(231,76,60,0.3);">
      <div class="card-icon">📐</div>
      <div class="card-title">六西格玛黑带</div>
      <div class="card-badge active">可用</div>
    </a>
    <a href="rx3i.html" class="card" style="border-color: rgba(59,130,246,0.3);">
      <div class="card-icon">🔧</div>
      <div class="card-title">艾默生RX3i</div>
      <div class="card-badge active">可用</div>
    </a>
    <a href="cimplicity_guide.html" class="card" style="border-color: rgba(245,158,11,0.3);">
      <div class="card-icon">🏭</div>
      <div class="card-title">CIMPLICITY</div>
      <div class="card-badge active">可用</div>
    </a>
    <a href="cimplicity_full_cn.html" class="card" style="border-color: rgba(16,185,129,0.3);">
      <div class="card-icon">📚</div>
      <div class="card-title">完整手册库</div>
      <div class="card-badge active">18本</div>
    </a>
  </div>
  <div class="footer">个人学习工具集</div>
</div>
</body>
</html>
