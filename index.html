<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>六西格玛黑带备考工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 480px;
  width: 100%;
}
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  color: #fff;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.header p {
  color: rgba(255,255,255,0.5);
  font-size: 14px;
}
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 28px 24px;
  margin-bottom: 16px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 18px;
  transition: all 0.3s ease;
  cursor: pointer;
}
.card:active {
  transform: scale(0.97);
  background: rgba(255,255,255,0.15);
}
.card-icon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.card-body { flex: 1; }
.card-title {
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}
.card-desc {
  color: rgba(255,255,255,0.45);
  font-size: 13px;
  line-height: 1.4;
}
.card-arrow {
  color: rgba(255,255,255,0.3);
  font-size: 22px;
}
.footer {
  text-align: center;
  margin-top: 30px;
  color: rgba(255,255,255,0.25);
  font-size: 12px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>六西格玛黑带</h1>
    <p>备考工具集</p>
  </div>
  <a href="exam.html" class="card">
    <div class="card-icon" style="background: linear-gradient(135deg, #e74c3c, #c0392b);">📝</div>
    <div class="card-body">
      <div class="card-title">模拟考试</div>
      <div class="card-desc">单选60题 + 多选30题，180分钟机考模拟</div>
    </div>
    <div class="card-arrow">›</div>
  </a>
  <a href="knowledge.html" class="card">
    <div class="card-icon" style="background: linear-gradient(135deg, #3498db, #2980b9);">📚</div>
    <div class="card-body">
      <div class="card-title">知识点详解</div>
      <div class="card-desc">DMAIC全流程知识点，公式与概念速查</div>
    </div>
    <div class="card-arrow">›</div>
  </a>
  <a href="guide.html" class="card">
    <div class="card-icon" style="background: linear-gradient(135deg, #2ecc71, #27ae60);">📖</div>
    <div class="card-body">
      <div class="card-title">学习指南</div>
      <div class="card-desc">考试大纲、备考策略、重点分布</div>
    </div>
    <div class="card-arrow">›</div>
  </a>
  <div class="footer">中质协注册六西格玛黑带考试备考</div>
</div>
</body>
</html>
