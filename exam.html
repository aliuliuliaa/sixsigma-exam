<title>六西格玛黑带模拟考试系统</title>
<style>
:root {
    --primary: #1a237e;
    --primary-light: #534bae;
    --accent: #ff6f00;
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #263238;
    --text-light: #78909c;
    --border: #e0e0e0;
    --success: #2e7d32;
    --success-bg: #e8f5e9;
    --danger: #c62828;
    --danger-bg: #ffebee;
    --warn: #f9a825;
    --warn-bg: #fff8e1;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
}
.hero {
    background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%);
    color: white;
    padding: 40px 20px 30px;
    text-align: center;
}
.hero h1 { font-size: 2em; font-weight: 800; margin-bottom: 8px; }
.hero .sub { font-size: 0.95em; opacity: 0.8; }
.container { max-width: 900px; margin: 0 auto; padding: 25px 20px; }

/* 模式选择 */
.mode-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 25px;
}
.mode-card {
    background: var(--card);
    border-radius: 14px;
    padding: 30px 25px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    border: 3px solid transparent;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.mode-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    border-color: var(--primary-light);
}
.mode-card .icon { font-size: 3em; margin-bottom: 12px; }
.mode-card .title { font-size: 1.3em; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
.mode-card .desc { font-size: 0.85em; color: var(--text-light); }

/* 设置面板 */
.settings-panel {
    background: var(--card);
    border-radius: 14px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.settings-panel h3 { color: var(--primary); margin-bottom: 15px; font-size: 1.1em; }
.cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin: 10px 0;
}
.cat-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: #f5f7fa;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.88em;
}
.cat-chip:hover { border-color: var(--primary-light); }
.cat-chip.selected {
    background: #e8eaf6;
    border-color: var(--primary);
    font-weight: 600;
}
.cat-chip .count {
    margin-left: auto;
    font-size: 0.8em;
    color: var(--text-light);
    background: white;
    padding: 1px 7px;
    border-radius: 10px;
}
.start-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-size: 1.15em;
    font-weight: 700;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.2s;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,35,126,0.3); }
.start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* 考试界面 */
.exam-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    padding: 15px 25px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    flex-wrap: wrap;
    gap: 10px;
}
.exam-header .progress-text { font-weight: 600; color: var(--primary); }
.exam-header .timer {
    font-size: 1.3em;
    font-weight: 800;
    font-family: 'Courier New', monospace;
    padding: 4px 16px;
    border-radius: 8px;
    background: #e8eaf6;
    color: var(--primary);
}
.exam-header .timer.warn { background: var(--warn-bg); color: var(--warn); }
.exam-header .timer.danger { background: var(--danger-bg); color: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }

.progress-bar-outer {
    width: 100%;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 8px 0 0;
}
.progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    transition: width 0.3s;
    border-radius: 4px;
}

.question-card {
    background: var(--card);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.q-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}
.q-cat {
    background: #e8eaf6;
    color: var(--primary);
    padding: 3px 12px;
    border-radius: 12px;
    font-size: 0.78em;
    font-weight: 600;
}
.q-num { color: var(--text-light); font-size: 0.82em; font-weight: 600; }
.q-text { font-size: 1.08em; line-height: 1.8; margin-bottom: 18px; }

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    background: #f8f9fb;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.95em;
}
.option:hover { border-color: var(--primary-light); background: #eef1f6; }
.option.selected {
    border-color: var(--primary);
    background: #e8eaf6;
    font-weight: 500;
}
.option.correct {
    border-color: var(--success);
    background: var(--success-bg);
}
.option.wrong {
    border-color: var(--danger);
    background: var(--danger-bg);
}
.option .opt-label {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85em;
    flex-shrink: 0;
    transition: all 0.15s;
}
.option.selected .opt-label { background: var(--primary); color: white; border-color: var(--primary); }
.option.correct .opt-label { background: var(--success); color: white; border-color: var(--success); }
.option.wrong .opt-label { background: var(--danger); color: white; border-color: var(--danger); }

.explanation {
    margin-top: 15px;
    padding: 18px;
    border-radius: 10px;
    display: none;
    animation: fadeIn 0.3s;
}
.explanation.show { display: block; }
.explanation.correct-exp { background: var(--success-bg); border-left: 4px solid var(--success); }
.explanation.wrong-exp { background: var(--danger-bg); border-left: 4px solid var(--danger); }
.explanation h4 { margin-bottom: 6px; font-size: 0.95em; }
.explanation p { font-size: 0.88em; color: var(--text); }
.explanation .formula-box {
    background: #263238;
    color: #80cbc4;
    padding: 8px 14px;
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 0.85em;
    margin: 6px 0;
    display: inline-block;
}

.nav-buttons {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin-top: 20px;
}
.nav-btn {
    padding: 12px 28px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-size: 0.95em;
    font-weight: 600;
    transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--primary-light); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn.primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}
.nav-btn.primary:hover { background: var(--primary-light); }

/* 标记按钮 */
.flag-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.82em;
    color: var(--text-light);
    transition: all 0.15s;
}
.flag-btn:hover { border-color: var(--accent); color: var(--accent); }
.flag-btn.flagged { background: var(--warn-bg); border-color: var(--warn); color: var(--warn); }

/* 结果页面 */
.result-hero {
    text-align: center;
    padding: 40px 20px;
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.result-hero .score-circle {
    width: 180px;
    height: 180px;
    margin: 0 auto 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
}
.result-hero .score-num { font-size: 3em; font-weight: 800; }
.result-hero .score-label { font-size: 0.85em; }
.score-pass { background: var(--success-bg); color: var(--success); border: 4px solid var(--success); }
.score-fail { background: var(--danger-bg); color: var(--danger); border: 4px solid var(--danger); }
.result-hero h2 { font-size: 1.5em; margin-bottom: 8px; }
.result-hero .stats-row {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    flex-wrap: wrap;
}
.result-hero .stat-item { text-align: center; }
.result-hero .stat-val { font-size: 1.8em; font-weight: 700; color: var(--primary); }
.result-hero .stat-lbl { font-size: 0.8em; color: var(--text-light); }

.cat-results {
    background: var(--card);
    border-radius: 14px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.cat-results h3 { color: var(--primary); margin-bottom: 15px; }
.cat-result-item {
    margin-bottom: 12px;
}
.cat-result-item .cat-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    font-size: 0.9em;
}
.cat-result-item .cat-bar-outer {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
}
.cat-result-item .cat-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s;
}

.review-section {
    background: var(--card);
    border-radius: 14px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.review-section h3 { color: var(--primary); margin-bottom: 15px; }
.review-item {
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    border-left: 4px solid;
}
.review-item.correct { background: var(--success-bg); border-color: var(--success); }
.review-item.wrong { background: var(--danger-bg); border-color: var(--danger); }
.review-item .review-q { font-weight: 600; margin-bottom: 6px; font-size: 0.92em; }
.review-item .review-a { font-size: 0.85em; color: var(--text-light); }
.review-item .review-a strong { color: var(--text); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.hidden { display: none !important; }

@media (max-width: 768px) {
    .mode-select { grid-template-columns: 1fr; }
    .cat-grid { grid-template-columns: 1fr; }
    .nav-buttons { flex-direction: column; }
    .hero h1 { font-size: 1.5em; }
    .hero { padding-top: calc(40px + env(safe-area-inset-top)); }
    .container { padding: 15px 12px; }
    .settings-panel { padding: 16px; }
    .mode-card { padding: 20px 15px; }
    .exam-header { padding: 12px 15px; }
    .exam-header .timer { font-size: 1.1em; }
    body { padding-top: env(safe-area-inset-top); }
}
</style>
</head>
<body>

<div class="hero">
    <h1>🎯 六西格玛黑带模拟考试系统</h1>
    <p class="sub">覆盖 ASQ CSSBB 全部核心考点 · 计时模拟 + 即时解析 + 错题回顾</p>
</div>

<div class="container">
    <!-- 模式选择 -->
    <div id="modeSelect">
        <div class="mode-select">
            <div class="mode-card" onclick="selectMode('study')">
                <div class="icon">📖</div>
                <div class="title">学习模式</div>
                <div class="desc">即时反馈 · 每题解析 · 不计时<br>适合边学边练、巩固知识点</div>
            </div>
            <div class="mode-card" onclick="selectMode('exam')">
                <div class="icon">⏱️</div>
                <div class="title">考试模式</div>
                <div class="desc">计时模拟 · 最后统一评分<br>还原真实考试节奏 · 1.5分钟/题</div>
            </div>
        </div>

        <div class="settings-panel hidden" id="settingsPanel">
            <h3>📚 选择考点范围（可多选，默认全选）</h3>
            <div class="cat-grid" id="catGrid"></div>
            <div id="modeHint" style="margin-top:15px; font-size:0.85em; color:var(--text-light);"></div>
            <button class="start-btn" onclick="startExam()">开始考试 →</button>
        </div>
    </div>

    <!-- 考试界面 -->
    <div id="examView" class="hidden">
        <div class="exam-header">
            <div>
                <div class="progress-text"><span id="curQNum">1</span> / <span id="totalQNum">30</span></div>
                <div class="progress-bar-outer" style="width:200px;">
                    <div class="progress-bar-inner" id="progressBar" style="width:3%"></div>
                </div>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="flag-btn" id="flagBtn" onclick="toggleFlag()">🚩 标记</button>
                <div class="timer" id="timer">00:00</div>
            </div>
        </div>

        <div class="question-card" id="questionCard">
            <!-- 动态填充 -->
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
        </div>
    </div>

    <!-- 结果界面 -->
    <div id="resultView" class="hidden">
        <div class="result-hero">
            <div class="score-circle" id="scoreCircle">
                <div class="score-num" id="scorePercent">0%</div>
                <div class="score-label">正确率</div>
            </div>
            <h2 id="resultTitle">考试完成！</h2>
            <p id="resultMsg" style="color:var(--text-light); font-size:0.9em;"></p>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-val" id="statCorrect">0</div>
                    <div class="stat-lbl">答对</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" style="color:var(--danger)" id="statWrong">0</div>
                    <div class="stat-lbl">答错</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" style="color:var(--warn)" id="statSkipped">0</div>
                    <div class="stat-lbl">未答</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" id="statTime">0:00</div>
                    <div class="stat-lbl">用时</div>
                </div>
            </div>
        </div>

        <div class="cat-results">
            <h3>📊 分类得分分析</h3>
            <div id="catResults"></div>
        </div>

        <div class="review-section">
            <h3>📝 错题回顾</h3>
            <div id="wrongReview"></div>
        </div>

        <div style="display:flex; gap:15px; margin-top:20px;">
            <button class="nav-btn" style="flex:1;" onclick="restart()">🔄 重新考试</button>
            <button class="nav-btn primary" style="flex:1;" onclick="reviewAll()">📋 查看全部题目</button>
        </div>
    </div>

    <!-- 全部回顾 -->
    <div id="allReviewView" class="hidden">
        <div class="review-section">
            <h3>📋 全部题目回顾</h3>
            <div id="allReview"></div>
        </div>
        <button class="nav-btn primary" style="width:100%; margin-top:15px;" onclick="backToResults()">← 返回结果</button>
    </div>
</div>

<script>
// ====== 题库 ======
const QUESTIONS = [
    // --- DMAIC 工具选择 ---
    {
        cat: "DMAIC工具选择",
        q: "一个项目团队正在确定项目的范围、关键客户需求和项目目标。他们最可能处于 DMAIC 的哪个阶段？",
        options: [
            "Measure 测量阶段",
            "Define 定义阶段",
            "Analyze 分析阶段",
            "Improve 改善阶段"
        ],
        answer: 1,
        explain: "Define 阶段的核心活动包括制定项目章程、识别 VOC、定义 CTQ、绘制 SIPOC 图和确定项目范围。这些活动的目的正是明确「做什么」和「为什么做」。",
        formula: "DMAIC 顺序：D → M → A → I → C"
    },
    {
        cat: "DMAIC工具选择",
        q: "某制造企业希望评估其测量系统（由不同操作员使用同一量具测量同一零件）的可靠性。应使用哪种工具？",
        options: [
            "过程能力分析 (Cp/Cpk)",
            "Gage R&R 研究",
            "假设检验",
            "FMEA"
        ],
        answer: 1,
        explain: "Gage R&R（重复性和再现性）研究专门用于评估测量系统的变差。重复性衡量同一操作员多次测量的一致性；再现性衡量不同操作员之间测量的一致性。",
        formula: "Gage R&R = 重复性 + 再现性\n可接受标准：%SV < 10%, NDC ≥ 5"
    },
    {
        cat: "DMAIC工具选择",
        q: "在分析阶段，团队需要找出导致缺陷的根本原因。以下哪个工具最适合用于系统性根因分析？",
        options: [
            "Pareto 图",
            "鱼骨图 (Ishikawa / 因果图)",
            "控制图",
            "直方图"
        ],
        answer: 1,
        explain: "鱼骨图（石川图）是根因分析的标志性工具，按 5M1E（人/机/料/法/环/测）分类组织潜在原因。Pareto 图用于识别「关键少数」；控制图用于监控稳定性；直方图用于查看分布形状。",
        formula: "5M1E: Man, Machine, Material, Method, Environment, Measurement"
    },
    {
        cat: "DMAIC工具选择",
        q: "项目团队需要确定哪些改进方案应优先实施，考虑每个方案的影响程度和实施难度。最适合的工具是？",
        options: [
            "DOE 实验设计",
            "影响-努力矩阵 (Impact-Effort Matrix)",
            "回归分析",
            "控制图"
        ],
        answer: 1,
        explain: "影响-努力矩阵将方案按「高影响-低努力」到「低影响-高努力」四象限分类，优先选择高影响低努力的方案（Quick Wins）。",
        formula: "象限：\n① 高影响低努力 → 立即实施\n② 高影响高努力 → 重大项目\n③ 低影响低努力 → 填充任务\n④ 低影响高努力 → 避免"
    },
    {
        cat: "DMAIC工具选择",
        q: "FMEA 中的 RPN 如何计算？",
        options: [
            "RPN = 严重度 + 发生度 + 可检测度",
            "RPN = 严重度 × 发生度 × 可检测度",
            "RPN = (严重度 + 发生度) × 可检测度",
            "RPN = 严重度 × 发生度 / 可检测度"
        ],
        answer: 1,
        explain: "RPN（Risk Priority Number）= S（Severity 严重度）× O（Occurrence 发生度）× D（Detection 可检测度），三项各取值 1-10，RPN 范围 1-1000。值越大风险越高，优先处理。",
        formula: "RPN = S × O × D\nS: 1-10, O: 1-10, D: 1-10\nRPN: 1 ~ 1000"
    },
    // --- 过程能力 ---
    {
        cat: "过程能力",
        q: "某过程的规格上限 USL=30，规格下限 LSL=10，均值 μ=20，标准差 σ=2。计算 Cp。",
        options: [
            "Cp = 1.67",
            "Cp = 2.50",
            "Cp = 3.33",
            "Cp = 5.00"
        ],
        answer: 0,
        explain: "Cp = (USL - LSL) / (6σ) = (30 - 10) / (6 × 2) = 20 / 12 = 1.67。Cp 衡量规格宽度相对于过程宽度的能力，不考虑均值是否居中。",
        formula: "Cp = (USL - LSL) / 6σ\n= (30 - 10) / (6 × 2)\n= 20 / 12\n= 1.67"
    },
    {
        cat: "过程能力",
        q: "接上题，计算 Cpk。已知 USL=30, LSL=10, μ=20, σ=2。",
        options: [
            "Cpk = 1.67",
            "Cpk = 2.50",
            "Cpk = 1.25",
            "Cpk = 3.33"
        ],
        answer: 0,
        explain: "Cpk = min(USL-μ, μ-LSL) / (3σ) = min(30-20, 20-10) / (3×2) = min(10,10) / 6 = 10/6 ≈ 1.67。本例均值居中，Cpk = Cp。若均值偏移，Cpk < Cp。",
        formula: "Cpk = min(USL-μ, μ-LSL) / 3σ\n= min(10, 10) / 6\n= 1.67\n（均值居中时 Cpk = Cp）"
    },
    {
        cat: "过程能力",
        q: "某过程在 10000 个机会中产生了 34 个缺陷。该过程的 DPMO 和对应的西格玛水平约为？",
        options: [
            "DPMO = 3400, σ ≈ 4.1",
            "DPMO = 340, σ ≈ 4.9",
            "DPMO = 3400, σ ≈ 4.3（考虑1.5σ漂移后接近4σ）",
            "DPMO = 34, σ ≈ 6"
        ],
        answer: 0,
        explain: "DPMO = 缺陷数 × 1,000,000 / (单位数 × 机会数) = 34 × 1,000,000 / 10000 = 3400。查西格玛换算表：DPMO=3400 对应约 4.1σ（长期，含1.5σ漂移）。六西格玛水平要求 DPMO ≤ 3.4。",
        formula: "DPMO = 34 × 10⁶ / 10000 = 3400\n查表：DPMO=3400 → ~4.1σ\n六西格玛：DPMO ≤ 3.4"
    },
    {
        cat: "过程能力",
        q: "Cp 和 Cpk 的关系，以下哪个说法是正确的？",
        options: [
            "Cpk 总是大于 Cp",
            "Cpk 总是等于 Cp",
            "Cpk 总是小于或等于 Cp",
            "Cpk 和 Cp 没有关系"
        ],
        answer: 2,
        explain: "Cpk 考虑了均值偏移，而 Cp 不考虑。当均值完全居中时 Cpk = Cp；当均值偏离中心时 Cpk < Cp。因此 Cpk ≤ Cp 永远成立。",
        formula: "Cp = (USL-LSL) / 6σ （不考虑偏移）\nCpk = min(USL-μ, μ-LSL) / 3σ （考虑偏移）\nCpk ≤ Cp 恒成立"
    },
    {
        cat: "过程能力",
        q: "Pp/Ppk 与 Cp/Cpk 的主要区别是什么？",
        options: [
            "Pp/Ppk 使用总体标准差，Cp/Cpk 使用样本标准差",
            "Pp/Ppk 使用样本标准差（长期），Cp/Cpk 使用短期内标准差",
            "Pp/Ppk 用于计量型数据，Cp/Cpk 用于计数型数据",
            "两者完全相同，只是名称不同"
        ],
        answer: 1,
        explain: "Cp/Cpk 使用短期内（子组内）标准差 σ，反映过程的潜在能力；Pp/Ppk 使用长期标准差 s（基于全部样本），反映过程的实际性能。长期性能通常低于短期潜力（因为存在额外变差源）。",
        formula: "Cp/Cpk: 短期 σ（子组内变差）→ 潜力\nPp/Ppk: 长期 s（总体变差）→ 实际性能\n通常 Ppk < Cpk"
    },
    // --- 假设检验 ---
    {
        cat: "假设检验",
        q: "在假设检验中，如果 P 值 = 0.03，显著性水平 α = 0.05，应如何决策？",
        options: [
            "不拒绝 H₀，结果不显著",
            "拒绝 H₀，结果显著",
            "需要更多信息才能判断",
            "拒绝 H₁，接受 H₀"
        ],
        answer: 1,
        explain: "P 值规则：当 P < α 时拒绝原假设 H₀。0.03 < 0.05，因此拒绝 H₀，结果在 5% 水平上统计显著。这意味着在 H₀ 为真的前提下，观察到当前结果（或更极端结果）的概率仅 3%。",
        formula: "决策规则：\nP < α → 拒绝 H₀（显著）\nP ≥ α → 不拒绝 H₀（不显著）\n0.03 < 0.05 → 拒绝 H₀"
    },
    {
        cat: "假设检验",
        q: "第一类错误（Type I Error）和第二类错误（Type II Error）分别是什么含义？",
        options: [
            "第一类：拒绝了真实的 H₀；第二类：未拒绝虚假的 H₀",
            "第一类：未拒绝虚假的 H₀；第二类：拒绝了真实的 H₀",
            "两类错误含义相同",
            "第一类：数据有误；第二类：计算有误"
        ],
        answer: 0,
        explain: "第一类错误（α，生产者风险）：H₀ 为真但被拒绝 — 误判有效果。第二类错误（β，消费者风险）：H₀ 为假但未被拒绝 — 漏判有效果。功效 = 1 - β。",
        formula: "α = P(拒绝H₀ | H₀为真) → 误报警\nβ = P(不拒绝H₀ | H₀为假) → 漏报\n功效 Power = 1 - β"
    },
    {
        cat: "假设检验",
        q: "比较两个独立样本的均值是否存在显著差异，首先应做什么检验？",
        options: [
            "直接进行双样本 t 检验",
            "先检验方差齐性（F 检验或 Levene 检验），再选择 t 检验类型",
            "进行卡方检验",
            "进行 ANOVA"
        ],
        answer: 1,
        explain: "双样本 t 检验分等方差和不等方差两种。先用 F 检验（正态数据）或 Levene 检验（非正态数据）检验方差是否相等：若方差齐 → 用 pooled t 检验；若方差不齐 → 用 Welch t 检验（Satterthwaite 近似）。",
        formula: "步骤：\n1. F检验/Levene检验 → 判断方差齐性\n2. 方差齐 → Pooled t-test\n3. 方差不齐 → Welch t-test"
    },
    {
        cat: "假设检验",
        q: "当数据不满足正态分布假设时，比较两组独立样本应使用哪种检验？",
        options: [
            "双样本 t 检验",
            "Mann-Whitney U 检验（Wilcoxon 秩和检验）",
            "卡方检验",
            "F 检验"
        ],
        answer: 1,
        explain: "Mann-Whitney U 检验是双样本 t 检验的非参数替代方法，不要求数据服从正态分布，基于秩（rank）进行比较。类似地，配对数据的非参数替代是 Wilcoxon 符号秩检验。",
        formula: "参数检验 → 非参数替代：\n双样本 t → Mann-Whitney U\n配对 t → Wilcoxon 符号秩\n单因素 ANOVA → Kruskal-Wallis"
    },
    {
        cat: "假设检验",
        q: "某工厂想检验产品合格率是否与生产线（A/B/C 三条线）有关。应使用哪种检验？",
        options: [
            "双样本 t 检验",
            "卡方独立性检验（χ² Test of Independence）",
            "单因素 ANOVA",
            "回归分析"
        ],
        answer: 1,
        explain: "卡方独立性检验适用于检验两个分类变量之间是否独立。生产线（A/B/C）和合格/不合格都是分类变量，构建列联表后计算 χ² 统计量。注意：每个单元格的期望频数应 ≥ 5。",
        formula: "χ² = Σ(O-E)² / E\nO = 观察频数, E = 期望频数\n条件：期望频数 ≥ 5"
    },
    // --- ANOVA ---
    {
        cat: "方差分析ANOVA",
        q: "单因素 ANOVA 的原假设是什么？",
        options: [
            "所有组方差相等",
            "所有组均值相等：μ₁ = μ₂ = ... = μₖ",
            "至少两组均值不等",
            "组间方差等于组内方差"
        ],
        answer: 1,
        explain: "ANOVA 的原假设是所有组的均值相等。若 P < α 则拒绝 H₀，说明至少有一组的均值与其他组不同（但不告诉你具体是哪组不同，需要事后多重比较）。",
        formula: "H₀: μ₁ = μ₂ = ... = μₖ\nH₁: 至少一个 μᵢ 不同\nF = MSB / MSW\n拒绝 H₀ 当 F > F_crit 或 P < α"
    },
    {
        cat: "方差分析ANOVA",
        q: "在 ANOVA 中，F 统计量如何计算？",
        options: [
            "F = MSW / MSB",
            "F = MSB / MSW",
            "F = SSB / SSW",
            "F = SST / SSE"
        ],
        answer: 1,
        explain: "F = MSB / MSW（组间均方 / 组内均方）。MSB = SSB / (k-1)，MSW = SSW / (N-k)。当组间差异远大于组内差异时 F 值大，倾向于拒绝 H₀。",
        formula: "F = MSB / MSW\nMSB = SSB / (k-1)  [组间]\nMSW = SSW / (N-k)  [组内]\nk=组数, N=总样本数"
    },
    {

        answer: 1,
        explain: "Tuckman 团队发展五阶段：Forming（形成期，成员客气试探）→ Storming（风暴期，冲突出现）→ Norming（规范期，建立规则）→ Performing（执行期，高效协作）→ Adjourning（解散期，项目结束）。黑带需识别团队所处阶段并采取相应领导风格。",
        formula: "Tuckman 五阶段：\nForming → Storming → Norming → Performing → Adjourning\n形成 → 风暴 → 规范 → 执行 → 解散\n\n领导风格：\n形成：指导型\n风暴：教练型\n规范：参与型\n执行：授权型"
    },
];

// ====== 状态管理 ======
let state = {
    mode: null, // 'study' or 'exam'
    selectedCats: new Set(),
    questions: [],
    currentIndex: 0,
    answers: {}, // {qIndex: optionIndex}
    flagged: new Set(),
    startTime: null,
    elapsedTime: 0,
    timerInterval: null,
    submitted: false
};

// 分类信息
const CATEGORIES = [...new Set(QUESTIONS.map(q => q.cat))];
const CAT_COLORS = {
    "DMAIC工具选择": "#1565c0",
    "过程能力": "#00838f",
    "假设检验": "#6a1b9a",
    "方差分析ANOVA": "#e65100",
    "回归分析": "#2e7d32",
    "实验设计DOE": "#c62828",
    "SPC控制图": "#ad1457",
    "精益工具": "#4527a0",
    "统计基础": "#00695c",
    "测量系统分析": "#ef6c00",
    "项目管理": "#37474f",
};

// ====== 初始化 ======
function init() {
    renderCatGrid();
}

function renderCatGrid() {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = CATEGORIES.map(cat => {
        const count = QUESTIONS.filter(q => q.cat === cat).length;
        return `<div class="cat-chip selected" onclick="toggleCat(this, '${cat}')">
            <span>${cat}</span>
            <span class="count">${count}题</span>
        </div>`;
    }).join('');
    // 默认全选
    CATEGORIES.forEach(c => state.selectedCats.add(c));
}

function toggleCat(el, cat) {
    if (state.selectedCats.has(cat)) {
        state.selectedCats.delete(cat);
        el.classList.remove('selected');
    } else {
        state.selectedCats.add(cat);
        el.classList.add('selected');
    }
}

function selectMode(mode) {
    state.mode = mode;
    document.getElementById('settingsPanel').classList.remove('hidden');
    const hint = document.getElementById('modeHint');
    if (mode === 'study') {
        hint.innerHTML = '📖 <strong>学习模式</strong>：每题作答后立即显示正确答案和详细解析，不计时。';
    } else {
        hint.innerHTML = '⏱️ <strong>考试模式</strong>：所有题目作答完毕后统一评分。每题约 1.5 分钟，系统自动计时。';
    }
    document.getElementById('settingsPanel').scrollIntoView({ behavior: 'smooth' });
}

function startExam() {
    if (state.selectedCats.size === 0) {
        alert('请至少选择一个考点类别');
        return;
    }
    // 筛选题目
    state.questions = QUESTIONS.filter(q => state.selectedCats.has(q.cat));
    // 打乱顺序
    state.questions = shuffle([...state.questions]);
    
    state.currentIndex = 0;
    state.answers = {};
    state.flagged = new Set();
    state.submitted = false;
    state.startTime = Date.now();

    document.getElementById('modeSelect').classList.add('hidden');
    document.getElementById('examView').classList.remove('hidden');
    document.getElementById('resultView').classList.add('hidden');

    document.getElementById('totalQNum').textContent = state.questions.length;

    if (state.mode === 'exam') {
        startTimer(state.questions.length * 90); // 1.5分钟/题
    } else {
        document.getElementById('timer').textContent = '学习模式';
        document.getElementById('timer').style.background = '#e8f5e9';
        document.getElementById('timer').style.color = '#2e7d32';
    }

    renderQuestion();
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function startTimer(seconds) {
    let remaining = seconds;
    const timerEl = document.getElementById('timer');
    state.timerInterval = setInterval(() => {
        remaining--;
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        
        if (remaining <= 60) {
            timerEl.classList.add('danger');
            timerEl.classList.remove('warn');
        } else if (remaining <= 300) {
            timerEl.classList.add('warn');
        }
        
        if (remaining <= 0) {
            clearInterval(state.timerInterval);
            alert('⏰ 时间到！系统将自动提交考试。');
            submitExam();
        }
    }, 1000);
    state.totalSeconds = seconds;
}

function renderQuestion() {
    const q = state.questions[state.currentIndex];
    const card = document.getElementById('questionCard');
    
    const answered = state.answers[state.currentIndex] !== undefined;
    const showFeedback = state.mode === 'study' && answered;
    
    let optionsHtml = q.options.map((opt, i) => {
        let cls = 'option';
        if (answered && i === state.answers[state.currentIndex]) cls += ' selected';
        if (showFeedback) {
            if (i === q.answer) cls += ' correct';
            else if (i === state.answers[state.currentIndex] && i !== q.answer) cls += ' wrong';
        }
        return `<div class="${cls}" onclick="selectOption(${i})">
            <div class="opt-label">${String.fromCharCode(65 + i)}</div>
            <div>${opt}</div>
        </div>`;
    }).join('');

    let feedbackHtml = '';
    if (showFeedback) {
        const isCorrect = state.answers[state.currentIndex] === q.answer;
        feedbackHtml = `<div class="explanation ${isCorrect ? 'correct-exp' : 'wrong-exp'} show">
            <h4>${isCorrect ? '✅ 回答正确！' : '❌ 回答错误'}</h4>
            <p><strong>正确答案：${String.fromCharCode(65 + q.answer)}</strong></p>
            <p>${q.explain}</p>
            ${q.formula ? `<div class="formula-box">${q.formula.replace(/\n/g, '<br>')}</div>` : ''}
        </div>`;
    }

    card.innerHTML = `
        <div class="q-meta">
            <span class="q-cat">${q.cat}</span>
            <span class="q-num">第 ${state.currentIndex + 1} 题 / 共 ${state.questions.length} 题</span>
        </div>
        <div class="q-text">${q.q}</div>
        <div class="options">${optionsHtml}</div>
        ${feedbackHtml}
    `;

    // 更新进度
    document.getElementById('curQNum').textContent = state.currentIndex + 1;
    const pct = ((state.currentIndex + 1) / state.questions.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';

    // 标记按钮
    const flagBtn = document.getElementById('flagBtn');
    if (state.flagged.has(state.currentIndex)) {
        flagBtn.classList.add('flagged');
        flagBtn.textContent = '🚩 已标记';
    } else {
        flagBtn.classList.remove('flagged');
        flagBtn.textContent = '🚩 标记';
    }

    // 导航按钮
    document.getElementById('prevBtn').disabled = state.currentIndex === 0;
    const nextBtn = document.getElementById('nextBtn');
    if (state.currentIndex === state.questions.length - 1) {
        nextBtn.textContent = state.mode === 'exam' ? '📊 提交考试' : '📊 查看结果';
    } else {
        nextBtn.textContent = '下一题 →';
    }
}

function selectOption(i) {
    if (state.submitted) return;
    state.answers[state.currentIndex] = i;
    renderQuestion();
}

function prevQuestion() {
    if (state.currentIndex > 0) {
        state.currentIndex--;
        renderQuestion();
    }
}

function nextQuestion() {
    if (state.currentIndex === state.questions.length - 1) {
        // 最后一题
        if (state.mode === 'exam') {
            const unanswered = state.questions.length - Object.keys(state.answers).length;
            if (unanswered > 0) {
                if (!confirm(`还有 ${unanswered} 题未作答，确定要提交吗？`)) return;
            }
            submitExam();
        } else {
            // 学习模式直接出结果
            submitExam();
        }
    } else {
        state.currentIndex++;
        renderQuestion();
    }
}

function toggleFlag() {
    if (state.flagged.has(state.currentIndex)) {
        state.flagged.delete(state.currentIndex);
    } else {
        state.flagged.add(state.currentIndex);
    }
    renderQuestion();
}

function submitExam() {
    state.submitted = true;
    if (state.timerInterval) clearInterval(state.timerInterval);
    state.elapsedTime = Math.floor((Date.now() - state.startTime) / 1000);
    
    document.getElementById('examView').classList.add('hidden');
    document.getElementById('resultView').classList.remove('hidden');
    renderResults();
}

function renderResults() {
    let correct = 0, wrong = 0, skipped = 0;
    const catStats = {};

    state.questions.forEach((q, i) => {
        if (!catStats[q.cat]) catStats[q.cat] = { correct: 0, wrong: 0, skipped: 0, total: 0 };
        catStats[q.cat].total++;
        
        if (state.answers[i] === undefined) {
            skipped++;
            catStats[q.cat].skipped++;
        } else if (state.answers[i] === q.answer) {
            correct++;
            catStats[q.cat].correct++;
        } else {
            wrong++;
            catStats[q.cat].wrong++;
        }
    });

    const total = state.questions.length;
    const pct = Math.round((correct / total) * 100);
    
    // 分数圆圈
    const circle = document.getElementById('scoreCircle');
    document.getElementById('scorePercent').textContent = pct + '%';
    if (pct >= 70) {
        circle.className = 'score-circle score-pass';
        document.getElementById('resultTitle').textContent = '🎉 恭喜通过！';
        document.getElementById('resultMsg').textContent = `正确率 ${pct}%（ASQ 合格线约 73%）。${pct >= 85 ? '成绩优秀，保持势头！' : '达到通过线，继续巩固薄弱环节。'}`;
    } else {
        circle.className = 'score-circle score-fail';
        document.getElementById('resultTitle').textContent = '📚 还需努力';
        document.getElementById('resultMsg').textContent = `正确率 ${pct}%，目标 70%+。查看下方错题分析和分类得分，针对性复习。`;
    }

    document.getElementById('statCorrect').textContent = correct;
    document.getElementById('statWrong').textContent = wrong;
    document.getElementById('statSkipped').textContent = skipped;
    const m = Math.floor(state.elapsedTime / 60);
    const s = state.elapsedTime % 60;
    document.getElementById('statTime').textContent = `${m}:${String(s).padStart(2,'0')}`;

    // 分类得分
    const catResultsEl = document.getElementById('catResults');
    catResultsEl.innerHTML = Object.entries(catStats).map(([cat, stats]) => {
        const catPct = Math.round((stats.correct / stats.total) * 100);
        const color = CAT_COLORS[cat] || '#666';
        let barColor = '#2e7d32';
        if (catPct < 50) barColor = '#c62828';
        else if (catPct < 70) barColor = '#f9a825';
        
        return `<div class="cat-result-item">
            <div class="cat-row">
                <span style="font-weight:600;">${cat}</span>
                <span style="color:${barColor}; font-weight:700;">${stats.correct}/${stats.total} (${catPct}%)</span>
            </div>
            <div class="cat-bar-outer">
                <div class="cat-bar-fill" style="width:${catPct}%; background:${barColor};"></div>
            </div>
        </div>`;
    }).join('');

    // 错题回顾
    const wrongReviewEl = document.getElementById('wrongReview');
    const wrongQuestions = state.questions.map((q, i) => ({ q, i })).filter(({ q, i }) => state.answers[i] !== undefined && state.answers[i] !== q.answer);
    
    if (wrongQuestions.length === 0) {
        wrongReviewEl.innerHTML = '<p style="text-align:center; color:var(--success); font-weight:600;">🎉 全部答对，没有错题！</p>';
    } else {
        wrongReviewEl.innerHTML = wrongQuestions.map(({ q, i }) => {
            const userAns = state.answers[i];
            return `<div class="review-item wrong">
                <div class="review-q">第 ${i+1} 题 [${q.cat}]：${q.q}</div>
                <div class="review-a">
                    <span style="color:var(--danger);">你的答案：${String.fromCharCode(65 + userAns)}. ${q.options[userAns]}</span><br>
                    <strong style="color:var(--success);">正确答案：${String.fromCharCode(65 + q.answer)}. ${q.options[q.answer]}</strong><br>
                    <span style="color:var(--text-light);">💡 ${q.explain}</span>
                    ${q.formula ? `<br><span style="font-family:monospace; background:#263238; color:#80cbc4; padding:3px 8px; border-radius:4px; font-size:0.82em; display:inline-block; margin-top:4px;">${q.formula.replace(/\n/g, ' | ')}</span>` : ''}
                </div>
            </div>`;
        }).join('');
    }
}

function reviewAll() {
    document.getElementById('resultView').classList.add('hidden');
    document.getElementById('allReviewView').classList.remove('hidden');
    
    const allReviewEl = document.getElementById('allReview');
    allReviewEl.innerHTML = state.questions.map((q, i) => {
        const userAns = state.answers[i];
        const isCorrect = userAns === q.answer;
        const isSkipped = userAns === undefined;
        const cls = isSkipped ? 'wrong' : (isCorrect ? 'correct' : 'wrong');
        const status = isSkipped ? '⬜ 未作答' : (isCorrect ? '✅ 正确' : '❌ 错误');
        
        return `<div class="review-item ${cls}">
            <div class="review-q">第 ${i+1} 题 [${q.cat}] ${status}<br>${q.q}</div>
            <div class="review-a">
                ${q.options.map((opt, j) => {
                    let marker = '';
                    if (j === q.answer) marker = '✓ ';
                    if (j === userAns && j !== q.answer) marker = '✗ ';
                    return `<div style="margin:2px 0;">${marker}<strong>${String.fromCharCode(65+j)}</strong>. ${opt}${j === q.answer ? ' <span style="color:var(--success); font-weight:600;">(正确答案)</span>' : ''}</div>`;
                }).join('')}
                <div style="margin-top:8px; color:var(--text-light);">💡 ${q.explain}</div>
                ${q.formula ? `<div style="font-family:monospace; background:#263238; color:#80cbc4; padding:6px 12px; border-radius:6px; font-size:0.82em; display:inline-block; margin-top:4px;">${q.formula.replace(/\n/g, '<br>')}</div>` : ''}
            </div>
        </div>`;
    }).join('');
}

function backToResults() {
    document.getElementById('allReviewView').classList.add('hidden');
    document.getElementById('resultView').classList.remove('hidden');
}

function restart() {
    state = {
        mode: null,
        selectedCats: new Set(),
        questions: [],
        currentIndex: 0,
        answers: {},
        flagged: new Set(),
        startTime: null,
        elapsedTime: 0,
        timerInterval: null,
        submitted: false
    };
    document.getElementById('resultView').classList.add('hidden');
    document.getElementById('allReviewView').classList.add('hidden');
    document.getElementById('examView').classList.add('hidden');
    document.getElementById('modeSelect').classList.remove('hidden');
    document.getElementById('settingsPanel').classList.add('hidden');
    init();
}

init();
</script>

</body>
</html>
